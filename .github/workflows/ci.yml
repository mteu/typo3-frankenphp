name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sqlite3, gd, intl, mbstring, dom, fileinfo, curl, zip, phar
          tools: composer:v2
          coverage: none

      - name: Bootstrap TYPO3 sandbox
        # Materializes Build/ (gitignored) and composer-installs everything
        # including the dev tools (phpstan, php-cs-fixer, typo3/coding-standards).
        run: composer install

      - name: PHPStan
        working-directory: .
        run: vendor/bin/phpstan analyse -c phpstan.neon --no-progress --memory-limit=512M

  cs-fixer:
    name: PHP-CS-Fixer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sqlite3, gd, intl, mbstring, dom, fileinfo, phar
          tools: composer:v2
          coverage: none

      - name: Bootstrap TYPO3 sandbox
        run: composer install

      - name: PHP-CS-Fixer (dry run)
        working-directory: .
        # --dry-run makes the job fail (non-zero exit) without modifying files;
        # --diff prints the would-be patch into the CI log for easy review.
        run: vendor/bin/php-cs-fixer fix --config=php-cs-fixer.php --dry-run --diff --using-cache=no

  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sqlite3, gd, intl, mbstring, dom, fileinfo, curl, zip, opcache, phar
          tools: composer:v2
          coverage: none
          ini-values: memory_limit=512M, max_input_vars=1500

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system deps
        # ImageMagick is required by TYPO3's GFX processor; sqlite3 by
        # scripts/setup-typo3.sh's prerequisite check.
        run: sudo apt-get update && sudo apt-get install -y imagemagick sqlite3

      - name: Install FrankenPHP
        # Install via the official Homebrew tap. The static-binary releases
        # from github.com/php/frankenphp/releases ship a stripped PHP build
        # that lacks libargon2 — TYPO3 v14 writes argon2i password hashes
        # via the shivammathur PHP and the static-binary worker then can't
        # verify them, leading to "Your login attempt did not succeed" on
        # every BE login (no CSRF flash, no 5xx). The Homebrew build is
        # full-fat (argon2i + argon2id + sodium + …) and matches what
        # local devs already use via `brew install frankenphp`.
        # See https://github.com/dunglas/homebrew-frankenphp.
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          # FrankenPHP's brew formula depends on shivammathur/php/php-zts,
          # which lives in a separate tap that needs an explicit `brew tap`
          # before the install resolves.
          brew tap shivammathur/php
          brew install dunglas/frankenphp/frankenphp
          # `eval brew shellenv` only mutates PATH in this step's shell;
          # subsequent steps spawn fresh `bash -e` and would lose it.
          # $GITHUB_PATH is the documented cross-step PATH extension.
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          frankenphp version

      - name: Bootstrap TYPO3 sandbox
        run: bash scripts/setup-typo3.sh

      - name: Regenerate frankenphp config (--force, prod profile)
        # Belt-and-braces: the Composer installer hook (RunFrankenphpInit)
        # should already have produced these files via setup-typo3.sh.
        # Explicitly regenerating defends against the hook ever regressing.
        working-directory: Build
        run: vendor/bin/typo3 frankenphp:init --no-interaction --force --profile=dev

      - name: Start FrankenPHP
        working-directory: Build
        run: |
          nohup frankenphp run -c Caddyfile -e .env > frankenphp.log 2>&1 &
          echo $! > frankenphp.pid
          for i in $(seq 1 30); do
            # `-f` makes curl exit non-zero on 4xx/5xx, so a worker that
            # accepted the TCP connection but is returning 500s doesn't
            # silently pass this readiness gate and let Playwright fail
            # with a useless timeout downstream.
            if curl -fsk -o /dev/null https://localhost:8885/typo3/login; then
              echo "frankenphp is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "frankenphp didn't come up — log follows:"
          cat frankenphp.log
          exit 1

      - name: Diagnose password hashing
        # See the same-named step in the load-testing job for the why.
        run: |
          echo "--- stored admin hash prefix ---"
          sqlite3 Build/var/sqlite/cms-*.sqlite \
              "SELECT username, substr(password, 1, 15) || '…' FROM be_users WHERE admin=1;"
          echo "--- frankenphp PHP build ---"
          frankenphp php-cli -r 'echo "PHP ", PHP_VERSION, "\n"; echo "password_algos: ", implode(", ", password_algos()), "\n"; echo "sodium loaded: ", extension_loaded("sodium") ? "yes" : "no", "\n";'

      - name: Install Playwright + browsers
        working-directory: Tests
        # Tests/ has no package-lock.json committed yet, so `npm install`
        # rather than `npm ci`.  --with-deps asks Playwright to apt-install
        # OS-level browser dependencies (fonts, GTK, X11 libs); webkit
        # segfaults on ubuntu-latest without them.
        run: |
          npm install
          npx playwright install --with-deps

      - name: Run Playwright
        working-directory: Tests
        # CI=true triggers the `retries: 2` branch in playwright.config.ts
        # plus forbidOnly, so leftover `test.only(...)` also fails the build.
        run: npm test
        env:
          CI: 'true'

      - name: Stop FrankenPHP
        if: always()
        working-directory: Build
        run: |
          if [ -f frankenphp.pid ]; then kill "$(cat frankenphp.pid)" || true; fi

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Tests/playwright-report/
          retention-days: 7

      - name: Upload FrankenPHP log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frankenphp-log
          path: Build/frankenphp.log
          retention-days: 7

  load-testing:
    name: Load testing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Pinned; tracking `latest` would let an upstream release break
      # this job without any commit in this repo. (FrankenPHP is
      # installed via Homebrew tap and picks up the current formula.)
      K6_VERSION: 'v2.0.0'
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sqlite3, gd, intl, mbstring, dom, fileinfo, curl, zip, opcache, phar
          tools: composer:v2
          coverage: none
          ini-values: memory_limit=512M, max_input_vars=1500

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system deps
        # ImageMagick for TYPO3's GFX processor; sqlite3 for setup-typo3.sh.
        run: sudo apt-get update && sudo apt-get install -y imagemagick sqlite3

      - name: Install FrankenPHP
        # See the Playwright job for the full rationale (argon2 missing
        # from the static-binary release → backend login fails). The
        # Homebrew tap ships the full-extension build.
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          # FrankenPHP's brew formula depends on shivammathur/php/php-zts,
          # which lives in a separate tap that needs an explicit `brew tap`
          # before the install resolves.
          brew tap shivammathur/php
          brew install dunglas/frankenphp/frankenphp
          # `eval brew shellenv` only mutates PATH in this step's shell;
          # subsequent steps spawn fresh `bash -e` and would lose it.
          # $GITHUB_PATH is the documented cross-step PATH extension.
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          frankenphp version

      - name: Install k6
        # Download the static binary from the grafana/k6 GitHub release.
        # Avoids the apt-key dance documented in Tests/load/README.md and
        # keeps the install hermetic to this single workflow.
        run: |
          curl -fL "https://github.com/grafana/k6/releases/download/${K6_VERSION}/k6-${K6_VERSION}-linux-amd64.tar.gz" \
            -o /tmp/k6.tar.gz
          tar -xzf /tmp/k6.tar.gz -C /tmp
          sudo mv "/tmp/k6-${K6_VERSION}-linux-amd64/k6" /usr/local/bin/k6
          k6 version

      - name: Bootstrap TYPO3 sandbox
        run: bash scripts/setup-typo3.sh

      - name: Regenerate frankenphp config (--force, dev profile)
        # Same belt-and-braces as the Playwright job — defends against
        # the Composer installer hook ever regressing on the .env /
        # Caddyfile generation.
        working-directory: Build
        run: vendor/bin/typo3 frankenphp:init --no-interaction --force --profile=dev

      - name: Start FrankenPHP
        working-directory: Build
        run: |
          nohup frankenphp run -c Caddyfile -e .env > frankenphp.log 2>&1 &
          echo $! > frankenphp.pid
          for i in $(seq 1 30); do
            # `-f` so a 5xx response doesn't silently satisfy the gate;
            # see the Playwright job's readiness loop for the rationale.
            if curl -fsk -o /dev/null https://localhost:8885/typo3/login; then
              echo "frankenphp is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "frankenphp didn't come up — log follows:"
          cat frankenphp.log
          exit 1

      - name: Diagnose password hashing
        # Captures the two pieces of data that determine whether BE
        # login can possibly succeed: (a) which algorithm `typo3 setup`
        # used for the admin row, and (b) which algorithms the worker's
        # PHP exposes. If (a)'s algo isn't in (b)'s list, every login
        # fails silently with "Your login attempt did not succeed"
        # and the k6 backend-smoke iterations bail at ~50/s.
        run: |
          echo "--- stored admin hash prefix ---"
          sqlite3 Build/var/sqlite/cms-*.sqlite \
              "SELECT username, substr(password, 1, 15) || '…' FROM be_users WHERE admin=1;"
          echo "--- frankenphp PHP build ---"
          frankenphp php-cli -r 'echo "PHP ", PHP_VERSION, "\n"; echo "password_algos: ", implode(", ", password_algos()), "\n"; echo "sodium loaded: ", extension_loaded("sodium") ? "yes" : "no", "\n";'

      - name: Frontend smoke
        working-directory: Tests
        run: npm run load:frontend:smoke

      - name: Backend smoke
        working-directory: Tests
        run: npm run load:backend:smoke

      - name: InstallTool smoke
        working-directory: Tests
        run: npm run load:install-tool:smoke

      - name: Stop FrankenPHP
        if: always()
        working-directory: Build
        run: |
          if [ -f frankenphp.pid ]; then kill "$(cat frankenphp.pid)" || true; fi

      - name: Upload FrankenPHP log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frankenphp-log-load
          path: Build/frankenphp.log
          retention-days: 7

  # Test Docker setup. Since this job is extremely expensive guard it against actual changes.
  docker-changes:
    name: Detect Docker file changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            docker:
              - 'docker/**'
              - 'docker-compose.yml'

  docker:
    name: Docker Compose
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: docker-changes
    # Only runs when docker-related files are changed, or when manually dispatched.
    # workflow_dispatch sets no changed-files context, so the filter output
    # is empty — the explicit event check keeps it runnable on demand.
    if: needs.docker-changes.outputs.docker == 'true' || github.event_name == 'workflow_dispatch'
    # First boot is heavily downloading stuff for image provisioning and TYPO3 and runs `typo3 setup` inside the
    # container, so allow very generous headroom over the native-install jobs.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build and start the stack
        # docker compose (v2) and a working buildx are preinstalled on
        # ubuntu-latest. `up -d` returns once the containers are created;
        # the readiness loop below waits for the entrypoint's
        # composer-install / frankenphp:init / typo3-setup chain to finish.
        run: docker compose up --build -d

      - name: Wait for the backend
        # Poll the mapped HTTPS port (8443 by default). `-f` makes curl exit
        # non-zero on 4xx/5xx so a container that's up but serving 500s
        # doesn't satisfy the gate. Allow up to ~10 min for the first-run
        # composer install + TYPO3 setup against MariaDB.
        run: |
          for i in $(seq 1 120); do
            if curl -fsk -o /dev/null https://localhost:8443/typo3/login; then
              echo "TYPO3 backend is up after $((i * 5))s"
              exit 0
            fi
            sleep 5
          done
          echo "Backend never came up — compose logs follow:"
          docker compose logs --no-color
          exit 1

      - name: Verify worker mode is active
        # Blunt black-box check:
        # The login page must render TYPO3's backend markup, proving
        # the worker booted HttpApplication (not a failsafe install fallback).
        # @todo: Extract information from systemInformation bar for certainty
        run: |
          curl -fsk https://localhost:8443/typo3/login | grep -qi 'typo3' \
            && echo "Backend login page rendered by the worker."

      - name: Dump compose logs
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v
